<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Een beetje verkoeling voor wie het warm heeft!">
    <meta property="og:title" content="Het is warm">
    <meta property="og:description" content="Een beetje verkoeling voor wie het warm heeft!">
    <title>Het is warm</title>
    <link rel="shortcut icon" type="image/png" sizes="32x32" href="/favicon.png">
    <style>
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            padding: 0;
            margin: 0;
            background: #ddd; 
            color:black;
            font: 14px Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }


        svg {
            shape-rendering: geometricPrecision;
            fill-rule: evenodd;
            clip-rule: evenodd;
        }

        svg path {
            fill: black;
        }

        .container {
            flex: 1 1 100%;
            padding: 25px 10px 0px 10px;
            overflow: hidden;
            text-align: center;
        }

        .fan {
            margin: 0 auto;
            height: 100%;
            width: 100%;
        }

        /* Info + controls */

        .footer {
            flex: 0 0;
            padding: 25px 10px 10px 10px;
            text-align: center;
        }

        .info {
            color: #999;
            float: right;
            font-size: 10px;
            margin-top: 20px;
            line-height: 10px
        }

        a,
        a:visited {
            color: #999;
        }

        a:hover {
            color: #666;
        }

        .btn {
            display: inline-block;
            margin: 0 5px;
            height: 50px;
            width: 50px;
            border: none;
            border-radius: 50%;
            vertical-align: middle;
            color: white;
            background: #555;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
            line-height: 50px;
            padding: 0;
        }

        .is-active {
            background: black;
            color: white;
        }

        .btn:visited {
            color: white;
        }

        .btn:hover {
            background: #111;
        }
    </style>
</head>
<body>
<div class="container">
    <svg id="fan" role="img" class="fan" data-speed="1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1996.88 1996.88">
        <title>Animatie van een ventilator</title>
        <path d="M1019.22 844.76c30.14,4.15 58.2,16.62 81.29,36.71 127.48,-131.35 289.37,-314.39 485.42,-320.53 169.42,-5.35 321.18,103.95 379.42,261.53 63.96,173.43 23.09,345.71 -55.43,454.24 -43.33,59.72 -112.97,118.59 -191.21,114.31 -54.73,-3 -107.15,-37.75 -145.95,-114.19 -33.79,-66.53 -77.39,-127.88 -131.97,-178.97 -81.18,-76.23 -183.23,-82.69 -288.55,-78.64 -4.16,29.91 -16.97,58.43 -36.83,81.29 131.36,127.13 314.41,289.74 320.53,485.42 5.35,169.42 -103.95,321.18 -261.53,379.42 -173.43,63.97 -345.7,23.09 -454.24,-55.43 -59.72,-43.33 -118.58,-112.97 -114.31,-191.21 3,-54.73 37.75,-107.15 114.19,-145.94 66.53,-33.8 127.88,-77.4 178.97,-131.98 76.23,-81.18 82.69,-183.23 78.64,-288.55 -30.26,-4.16 -58.31,-16.74 -81.29,-36.83 -127.48,131.35 -289.37,314.4 -485.42,320.53 -169.42,5.35 -321.18,-103.95 -379.42,-261.53 -63.96,-173.43 -23.09,-345.7 55.43,-454.24 43.33,-59.72 112.97,-118.58 191.21,-114.31 54.73,3 107.15,37.76 145.95,114.19 33.79,66.53 77.39,127.88 131.97,178.98 81.17,76.21 183.35,82.68 288.67,78.63 4.04,-30.26 16.39,-57.97 36.71,-81.29 -131.36,-127.06 -314.41,-289.81 -320.53,-485.42 -5.35,-169.42 103.95,-321.18 261.53,-379.42 173.43,-63.96 345.7,-23.09 454.24,55.43 59.72,43.33 118.58,112.97 114.31,191.21 -3,54.73 -37.75,107.15 -114.19,145.95 -66.53,33.8 -127.88,77.39 -178.97,131.97 -76.45,81.41 -82.68,183.47 -78.64,288.67zm-69.04 78.51c-41.46,26.68 -53.47,81.98 -26.68,123.44 26.68,41.45 81.98,53.46 123.44,26.67 41.45,-26.67 53.46,-81.98 26.67,-123.43 -26.67,-41.46 -81.98,-53.46 -123.43,-26.68z">
            <animateTransform
                id="fan-animation"
                attributeName="transform"
                attributeType="XML"
                type="rotate"
                from="0 998.44 998.44"
                to="360 998.44 998.44"
                dur="5s"
                repeatCount="indefinite"
            ></animateTransform>
        </path>
    </svg>
</div>
<div class="footer">
    <div class="controls">
        <button type="button" class="btn">0</button>
        <button type="button" class="btn is-active" data-speed="5s">1</button>
        <button type="button" class="btn" data-speed="2s">2</button>
        <button type="button" class="btn" data-speed="1s">3</button>
    </div>
    <div class="info">
        gemaakt door <a href="//martijnluinstra.nl/">Martijn Luinstra</a>
    </div>
</div>
<script>
    const svg = document.getElementById('fan');
    const animation = document.getElementById('fan-animation');
    const buttons = document.querySelectorAll('.controls .btn');

    buttons.forEach(function(button) {
        button.addEventListener('click', function() {
            // Toggle button state
            buttons.forEach(function(btn) {
                btn.classList.remove('is-active');
            });
            button.classList.add('is-active');

            // Set animation speed
            if (!button.dataset.speed) {
                svg.pauseAnimations();
            } else {
                // Offset timing to prevent position jumping
                const offset = ((animation.getCurrentTime() / animation.getSimpleDuration()) % 1);
                animation.setAttribute('dur', button.dataset.speed);
                svg.setCurrentTime(parseFloat(button.dataset.speed) * offset);
                svg.unpauseAnimations();
            }
        });
    });
</script>
</body>
</html>
